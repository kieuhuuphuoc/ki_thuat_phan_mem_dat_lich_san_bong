<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sân - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: #1a1a2e;
            color: white;
            position: fixed;
            height: 100vh;
            padding: 20px 0;
        }
        .sidebar h3 { text-align: center; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar a { display: block; padding: 15px 20px; color: white; text-decoration: none; transition: all 0.3s; }
        .sidebar a:hover { background: #667eea; padding-left: 25px; }

        /* Main Content */
        .content { margin-left: 260px; padding: 20px; }
        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 { font-size: 24px; color: #333; }
        .header h1 i { color: #667eea; margin-right: 10px; }

        /* Table */
        .table-container { background: white; border-radius: 12px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th, td { padding: 14px 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #1a1a2e; color: white; }
        tr:hover { background: #f8f9fa; }

        /* Buttons */
        .btn { padding: 8px 18px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
        .btn-warning { background: #ed8936; color: white; }
        .btn-warning:hover { background: #dd6b20; }
        .btn-danger { background: #f56565; color: white; }
        .btn-danger:hover { background: #e53e3e; }
        .btn-sm { padding: 5px 12px; font-size: 12px; margin: 0 3px; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-content h3 { margin-bottom: 20px; color: #333; }
        .modal-content h3 i { color: #667eea; margin-right: 10px; }

        /* Form */
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #555; }
        .form-group label i { color: #667eea; margin-right: 6px; width: 20px; }
        .form-control { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; }
        .form-control:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 14px 24px;
            border-radius: 12px;
            color: white;
            z-index: 1100;
            animation: slideIn 0.3s ease;
        }
        .toast-success { background: linear-gradient(135deg, #48bb78, #38a169); }
        .toast-error { background: linear-gradient(135deg, #f56565, #e53e3e); }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .spinner { text-align: center; padding: 40px; color: #667eea; }
        .price-cell { color: #667eea; font-weight: 600; }

        @media (max-width: 768px) {
            .sidebar { width: 100%; position: relative; height: auto; }
            .content { margin-left: 0; }
            .header { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3><i class="fas fa-futbol"></i> Admin Panel</h3>
        <a href="index.html"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="pitches.html" style="background: #667eea;"><i class="fas fa-futbol"></i> Quản lý sân</a>
        <a href="bookings.html"><i class="fas fa-calendar-alt"></i> Quản lý đặt sân</a>
        <a href="../../index.html"><i class="fas fa-home"></i> Về trang chủ</a>
        <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
    </div>

    <div class="content">
        <div class="header">
            <h1><i class="fas fa-futbol"></i> Quản lý sân bóng</h1>
            <button class="btn btn-primary" onclick="showAddModal()">
                <i class="fas fa-plus"></i> Thêm sân mới
            </button>
        </div>

        <div class="table-container" id="pitchesTable">
            <div class="spinner"><i class="fas fa-spinner fa-spin"></i> Đang tải...</div>
        </div>
    </div>

    <!-- Modal thêm sân -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <h3><i class="fas fa-plus-circle"></i> Thêm sân mới</h3>
            <form id="addForm">
                <div class="form-group">
                    <label><i class="fas fa-tag"></i> Tên sân</label>
                    <input type="text" id="add_name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-users"></i> Loại sân</label>
                    <input type="text" id="add_type" class="form-control" placeholder="Sân 5 người, 7 người...">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-map-marker-alt"></i> Địa chỉ</label>
                    <input type="text" id="add_location" class="form-control">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-dollar-sign"></i> Giá (VNĐ/giờ)</label>
                    <input type="number" id="add_price" class="form-control" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-info-circle"></i> Mô tả</label>
                    <textarea id="add_description" class="form-control" rows="3"></textarea>
                </div>
                <div style="display: flex; gap: 12px;">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Lưu</button>
                    <button type="button" class="btn btn-danger" onclick="closeAddModal()"><i class="fas fa-times"></i> Hủy</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal sửa sân -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3><i class="fas fa-edit"></i> Sửa sân</h3>
            <form id="editForm">
                <input type="hidden" id="edit_id">
                <div class="form-group">
                    <label><i class="fas fa-tag"></i> Tên sân</label>
                    <input type="text" id="edit_name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-users"></i> Loại sân</label>
                    <input type="text" id="edit_type" class="form-control">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-map-marker-alt"></i> Địa chỉ</label>
                    <input type="text" id="edit_location" class="form-control">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-dollar-sign"></i> Giá (VNĐ/giờ)</label>
                    <input type="number" id="edit_price" class="form-control" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-info-circle"></i> Mô tả</label>
                    <textarea id="edit_description" class="form-control" rows="3"></textarea>
                </div>
                <div style="display: flex; gap: 12px;">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Cập nhật</button>
                    <button type="button" class="btn btn-danger" onclick="closeEditModal()"><i class="fas fa-times"></i> Hủy</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = '/web_dat_lich_san_bong/api';

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('vi-VN').format(amount) + 'đ';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getCurrentUser() {
            const user = sessionStorage.getItem('user');
            return user ? JSON.parse(user) : null;
        }

        // Load danh sách sân
        async function loadPitches() {
            const container = document.getElementById('pitchesTable');
            try {
                const response = await fetch(`${API_BASE}/pitches/list.php`);
                const data = await response.json();

                if (data.pitches && data.pitches.length > 0) {
                    let html = `
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Tên sân</th>
                                    <th>Loại</th>
                                    <th>Địa chỉ</th>
                                    <th>Giá</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;
                    for (const pitch of data.pitches) {
                        html += `
                            <tr>
                                <td>${pitch.id}</td>
                                <td><strong>${escapeHtml(pitch.name)}</strong></td>
                                <td>${escapeHtml(pitch.type || '---')}</td>
                                <td>${escapeHtml(pitch.location || '---')}</td>
                                <td class="price-cell">${formatCurrency(pitch.price_per_hour)}</td>
                                <td>
                                    <button class="btn btn-warning btn-sm" onclick="showEditModal(${pitch.id})"><i class="fas fa-edit"></i> Sửa</button>
                                    <button class="btn btn-danger btn-sm" onclick="deletePitch(${pitch.id})"><i class="fas fa-trash"></i> Xóa</button>
                                </td>
                            </tr>
                        `;
                    }
                    html += `</tbody></table>`;
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<div style="padding: 60px; text-align: center; color: #999;"><i class="fas fa-futbol" style="font-size: 48px;"></i><br>Chưa có sân nào</div>';
                }
            } catch (error) {
                container.innerHTML = '<div style="padding: 40px; text-align: center; color: red;">Lỗi tải dữ liệu!</div>';
            }
        }

        // Xóa sân
        async function deletePitch(id) {
            if (!confirm('⚠️ CẢNH BÁO: Xóa sân sẽ ảnh hưởng đến lịch đặt liên quan!\nBạn có chắc chắn muốn xóa?')) return;
            try {
                const response = await fetch(`${API_BASE}/pitches/delete.php?id=${id}`, { method: 'DELETE' });
                const result = await response.json();
                if (result.success) {
                    showToast('Xóa sân thành công!', 'success');
                    loadPitches();
                } else {
                    showToast(result.message || 'Xóa thất bại', 'error');
                }
            } catch (error) {
                showToast('Có lỗi xảy ra!', 'error');
            }
        }

        // Thêm sân
        async function addPitch(event) {
            event.preventDefault();
            const data = {
                name: document.getElementById('add_name').value.trim(),
                type: document.getElementById('add_type').value.trim(),
                location: document.getElementById('add_location').value.trim(),
                price: parseInt(document.getElementById('add_price').value),
                description: document.getElementById('add_description').value.trim()
            };
            if (!data.name) { showToast('Vui lòng nhập tên sân', 'error'); return; }
            if (data.price <= 0) { showToast('Giá sân phải lớn hơn 0', 'error'); return; }

            const submitBtn = document.querySelector('#addForm button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xử lý...';
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/pitches/create.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (result.success) {
                    showToast(result.message, 'success');
                    closeAddModal();
                    loadPitches();
                    document.getElementById('addForm').reset();
                } else {
                    showToast(result.message || 'Thêm thất bại', 'error');
                }
            } catch (error) {
                showToast('Có lỗi xảy ra!', 'error');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        }

        // Hiển thị modal sửa
        async function showEditModal(id) {
            try {
                const response = await fetch(`${API_BASE}/pitches/detail.php?id=${id}`);
                const data = await response.json();
                if (data.pitch) {
                    document.getElementById('edit_id').value = data.pitch.id;
                    document.getElementById('edit_name').value = data.pitch.name;
                    document.getElementById('edit_type').value = data.pitch.type || '';
                    document.getElementById('edit_location').value = data.pitch.location || '';
                    document.getElementById('edit_price').value = data.pitch.price_per_hour;
                    document.getElementById('edit_description').value = data.pitch.description || '';
                    document.getElementById('editModal').style.display = 'flex';
                }
            } catch (error) {
                showToast('Lỗi tải dữ liệu sân!', 'error');
            }
        }

        // Cập nhật sân
        async function updatePitch(event) {
            event.preventDefault();
            const data = {
                id: document.getElementById('edit_id').value,
                name: document.getElementById('edit_name').value.trim(),
                type: document.getElementById('edit_type').value.trim(),
                location: document.getElementById('edit_location').value.trim(),
                price: parseInt(document.getElementById('edit_price').value),
                description: document.getElementById('edit_description').value.trim()
            };
            if (!data.name) { showToast('Vui lòng nhập tên sân', 'error'); return; }
            if (data.price <= 0) { showToast('Giá sân phải lớn hơn 0', 'error'); return; }

            const submitBtn = document.querySelector('#editForm button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xử lý...';
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/pitches/update.php`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (result.success) {
                    showToast('Cập nhật sân thành công!', 'success');
                    closeEditModal();
                    loadPitches();
                } else {
                    showToast(result.message || 'Cập nhật thất bại', 'error');
                }
            } catch (error) {
                showToast('Có lỗi xảy ra!', 'error');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        }

        function showAddModal() {
            document.getElementById('addModal').style.display = 'flex';
        }
        function closeAddModal() {
            document.getElementById('addModal').style.display = 'none';
            document.getElementById('addForm').reset();
        }
        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
            document.getElementById('editForm').reset();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const user = getCurrentUser();
            if (!user || user.role !== 'admin') {
                window.location.href = '../../login.html';
                return;
            }
            loadPitches();

            document.getElementById('logoutBtn').addEventListener('click', (e) => {
                e.preventDefault();
                sessionStorage.removeItem('user');
                window.location.href = '../../login.html';
            });
            document.getElementById('addForm').addEventListener('submit', addPitch);
            document.getElementById('editForm').addEventListener('submit', updatePitch);
        });

        window.onclick = function(event) {
            if (event.target === document.getElementById('addModal')) closeAddModal();
            if (event.target === document.getElementById('editModal')) closeEditModal();
        }
    </script>
</body>
</html>
