<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt Sân Bóng - Đặt sân online dễ dàng</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-futbol"></i> Đặt <span>Sân Bóng</span>
        </div>
        <div class="nav-links">
            <a href="index.html"><i class="fas fa-home"></i> Trang chủ</a>
            <a href="pitches.html"><i class="fas fa-list"></i> Sân bóng</a>
            <a href="my-bookings.html" id="my-bookings-link" style="display: none;"><i class="fas fa-calendar-alt"></i> Lịch của tôi</a>
            <a href="booking.html" id="booking-link" style="display: none;"><i class="fas fa-plus-circle"></i> Đặt sân</a>
            <a href="assets/admin/index.html" id="admin-link" style="display: none;"><i class="fas fa-shield-alt"></i> Admin</a>
            <a href="#" id="logout-link" style="display: none;">
                <i class="fas fa-sign-out-alt"></i> Đăng xuất (<span class="user-name"></span>)
            </a>
            <a href="login.html" id="login-link"><i class="fas fa-sign-in-alt"></i> Đăng nhập</a>
            <a href="register.html" id="register-link"><i class="fas fa-user-plus"></i> Đăng ký</a>
            <button id="darkModeToggle" class="dark-mode-btn" onclick="toggleDarkMode()">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <div class="container">
        <div class="hero">
            <i class="fas fa-futbol"></i>
            <h1>Đặt Sân Bóng Online</h1>
            <p>Nhanh chóng - Tiện lợi - Không lo trùng lịch</p>
            <a href="pitches.html" class="btn btn-outline">
                <i class="fas fa-search"></i> Xem sân ngay
            </a>
            <div class="stats-badge">
                <div><i class="fas fa-calendar-check"></i> <span id="todayBookings">0</span> đặt hôm nay</div>
                <div><i class="fas fa-futbol"></i> Sân chất lượng cao</div>
            </div>
        </div>

        <div class="search-filter">
            <input type="text" id="searchInput" class="form-control" placeholder="🔍 Tìm kiếm sân bóng...">
            <select id="priceFilter" class="form-control">
                <option value="all">💰 Tất cả giá</option>
                <option value="under300">Dưới 300.000đ</option>
                <option value="300-500">300.000đ - 500.000đ</option>
                <option value="over500">Trên 500.000đ</option>
            </select>
        </div>

        <h2 style="text-align: center; margin: 20px 0;">
            <i class="fas fa-star" style="color: #fbbf24;"></i> Sân bóng nổi bật
        </h2>
        <div id="featured-pitches" class="grid"></div>
    </div>

    <script src="assets/js/utils.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        // Hàm logout
        function logoutNow() {
            sessionStorage.removeItem('user');
            window.location.href = '/web_dat_lich_san_bong/public/login.html';
        }
        
        // Gắn sự kiện logout cho nút logout-link
        document.getElementById('logout-link')?.addEventListener('click', function(e) {
            e.preventDefault();
            logoutNow();
        });
        
        // Load sân nổi bật
        async function loadFeaturedPitches() {
            const container = document.getElementById('featured-pitches');
            try {
                const data = await apiCall('/pitches/list.php');
                if (data.pitches && data.pitches.length) {
                    const featured = data.pitches.slice(0, 6);
                    container.innerHTML = featured.map(pitch => `
                        <div class="card pitch-card">
                            <h3><i class="fas fa-futbol"></i> ${escapeHtml(pitch.name)}</h3>
                            <p><i class="fas fa-tag"></i> <strong>Loại:</strong> ${escapeHtml(pitch.type || 'Sân bóng đá')}</p>
                            <p><i class="fas fa-map-marker-alt"></i> <strong>Địa chỉ:</strong> ${escapeHtml(pitch.location || 'Đang cập nhật')}</p>
                            <p><i class="fas fa-dollar-sign"></i> <strong>Giá:</strong> <span class="price">${formatCurrency(pitch.price_per_hour)}</span>/giờ</p>
                            <button class="btn btn-primary" onclick="window.location.href='booking.html?pitch_id=${pitch.id}'">
                                <i class="fas fa-calendar-check"></i> Đặt ngay
                            </button>
                        </div>
                    `).join('');
                    
                    const searchInput = document.getElementById('searchInput');
                    const priceFilter = document.getElementById('priceFilter');
                    if (searchInput) searchInput.addEventListener('keyup', filterPitches);
                    if (priceFilter) priceFilter.addEventListener('change', filterPitches);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        // Cập nhật giao diện dựa trên user
        function updateUIForUser() {
            const user = getCurrentUser();
            console.log('Current user:', user);
            
            const myBookingsLink = document.getElementById('my-bookings-link');
            const bookingLink = document.getElementById('booking-link');
            const loginLink = document.getElementById('login-link');
            const registerLink = document.getElementById('register-link');
            const logoutLink = document.getElementById('logout-link');
            const adminLink = document.getElementById('admin-link');
            const userNameSpan = document.querySelector('.user-name');
            
            if (user) {
                if (myBookingsLink) myBookingsLink.style.display = 'inline-block';
                if (bookingLink) bookingLink.style.display = 'inline-block';
                if (loginLink) loginLink.style.display = 'none';
                if (registerLink) registerLink.style.display = 'none';
                if (logoutLink) logoutLink.style.display = 'inline-block';
                if (userNameSpan) userNameSpan.textContent = user.name;
                if (user.role === 'admin' && adminLink) adminLink.style.display = 'inline-block';
            } else {
                if (myBookingsLink) myBookingsLink.style.display = 'none';
                if (bookingLink) bookingLink.style.display = 'none';
                if (loginLink) loginLink.style.display = 'inline-block';
                if (registerLink) registerLink.style.display = 'inline-block';
                if (logoutLink) logoutLink.style.display = 'none';
                if (adminLink) adminLink.style.display = 'none';
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadFeaturedPitches();
            loadHomeStats();
            updateUIForUser();
        });
    </script>
</body>
</html>
